name: Bicep Deploy

on:
  workflow_dispatch:
    inputs:
      parametersFile:
        description: Path to the bicepparam file
        required: false
        default: main.customer.bicepparam
      resourceGroupName:
        description: Resource group name
        required: true
        default: rg-ai-gateway
      location:
        description: Azure location
        required: true
        default: eastus2

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Bicep
        run: az bicep install

      - name: Run deploy
        shell: pwsh
        run: |
          ./deploy-standard.ps1 -SubscriptionId '${{ secrets.AZURE_SUBSCRIPTION_ID }}' -ParametersFile '${{ github.event.inputs.parametersFile }}' -ResourceGroupName '${{ github.event.inputs.resourceGroupName }}' -Location '${{ github.event.inputs.location }}' -Force